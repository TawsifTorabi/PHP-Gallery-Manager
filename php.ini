;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; File Uploads               ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Enable file uploads
file_uploads = On

; The maximum size of an INDIVIDUAL file
; Set this to slightly more than your expected largest single file
upload_max_filesize = 2500M

; The maximum size of the ENTIRE POST body (all files + text fields)
; MUST be larger than upload_max_filesize
post_max_size = 3000M

; The maximum number of files allowed in one request
; Default is 20, which is likely why your 25-file upload failed
max_file_uploads = 100


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Resource Limits            ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; How much memory a script can consume
; Uploading large files doesn't usually use much RAM (it streams to disk), 
; but processing them (like your WebP to JPG conversion) DOES.
memory_limit = 1024M

; Maximum execution time of each script, in seconds
; 2GB over a typical connection takes time. 3600 = 1 hour.
max_execution_time = 3600

; Maximum amount of time each script may spend parsing request data
max_input_time = 3600

; Maximum number of input variables (can be an issue with massive forms)
max_input_vars = 2000